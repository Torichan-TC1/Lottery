<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>スパルタ数学認証 - リアルタイム版</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        /* (前回までのCSSと同じです。適宜調整してください) */
        body { font-family: 'Courier New', Courier, monospace; text-align: center; background: #000; color: #0f0; }
        .screen { border: 2px solid #0f0; padding: 20px; width: 400px; margin: 30px auto; background: #111; }
        .visitor-counter { color: #fff; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="visitor-counter">LIVE VISITORS: <span id="visitor-count">Loading...</span></div>
        <h2>SYSTEM ACCESS</h2>
        <input type="password" id="pass-input" placeholder="Password">
        <br>
        <button onclick="startChallenge()">ENTER</button>
    </div>

    <script>
        // 【重要】ここにFirebaseのコンソールから取得した設定を貼り付けます
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "your-project.firebaseapp.com",
            databaseURL: "https://your-project-default-rtdb.firebaseio.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 訪問者数をリアルタイムで監視
        const visitorRef = database.ref('visitorCount');
        
        // ページを開いたときにカウントを増やす（本来はセッション管理が必要ですが簡易版）
        visitorRef.transaction(function(current) {
            return (current || 0) + 1;
        });

        // 数字の変化をリアルタイムで受け取る
        visitorRef.on('value', (snapshot) => {
            document.getElementById('visitor-count').innerText = snapshot.val();
        });

        // --- 以下、認証ロジックは前回同様 ---
        function startChallenge() {
            if(document.getElementById('pass-input').value === "secret123") {
                alert("認証開始...");
                // 認証画面への遷移コード
            } else {
                alert("Wrong Password!");
            }
        }
    </script>
</body>
</html>
