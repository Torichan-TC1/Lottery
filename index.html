<div id="authGate" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); color:white; flex-direction:column; justify-content:center; align-items:center; z-index:999;">
    <h2>社員認証：人間であることを証明せよ</h2>
    <p>以下の式を解け：</p>
    <div id="mathProblem" style="font-size: 2.5em; margin: 20px; color: gold;"></div>
    <input type="number" id="mathAnswer" placeholder="答えを入力...">
    <div id="timerDisplay" style="margin: 20px; font-size: 2em; color: red;">30</div>
    <button onclick="checkMath()">送信</button>
</div>

<script>
    let correctAnswer;
    let timerInterval;

    function startAuth() {
        document.getElementById('authGate').style.display = 'flex';
        const type = Math.floor(Math.random() * 3); // 3パターンからランダム

        if (type === 0) { // 積分パターン: \int_0^a x dx = a^2 / 2
            const a = Math.floor(Math.random() * 8) + 2;
            correctAnswer = (a * a) / 2;
            document.getElementById('mathProblem').innerText = `∫[0, ${a}] x dx = ?`;
        } else if (type === 1) { // ルート・分数パターン: \frac{\sqrt{x}}{a} = b
            const a = Math.floor(Math.random() * 5) + 2;
            const b = Math.floor(Math.random() * 5) + 2;
            correctAnswer = (a * b) ** 2;
            document.getElementById('mathProblem').innerText = `√x / ${a} = ${b}`;
        } else { // 代数パターン: a * x + b = c
            const a = Math.floor(Math.random() * 10) + 1;
            const b = Math.floor(Math.random() * 20) + 1;
            const x = Math.floor(Math.random() * 10) + 1;
            correctAnswer = x;
            document.getElementById('mathProblem').innerText = `${a}x + ${b} = ${a*x + b}`;
        }

        let timeLeft = 30;
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timerDisplay').innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                alert("認証失敗。君のような未熟者にこの部署は早い。");
                location.reload(); 
            }
        }, 1000);
    }

    function checkMath() {
        const userAnswer = document.getElementById('mathAnswer').value;
        if (parseInt(userAnswer) === correctAnswer) {
            clearInterval(timerInterval);
            document.getElementById('authGate').style.display = 'none';
            alert("……合格。さあ、仕事を始めろ。");
        } else {
            alert("計算ミス？そんなことで我が社が務まると思っているのか？");
        }
    }

    // 最初に呼び出す
    window.onload = startAuth;
</script>
