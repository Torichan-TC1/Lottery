<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ロボット認証 v9.0</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; text-align: center; padding: 20px; background: #000; color: #0f0; }
        .screen { border: 2px solid #0f0; padding: 20px; width: 650px; margin: 30px auto; border-radius: 5px; background: #111; }
        .hidden { display: none; }
        #timer { font-size: 3em; color: #ff0000; margin: 10px 0; font-weight: bold; }
        #statement { font-size: 1.2em; color: #aaa; margin-bottom: 10px; }
        #equation { font-size: 1.8em; margin: 20px; color: #fff; background: #000; padding: 15px; border: 1px solid #333; }
        input { padding: 8px; font-size: 1.2em; width: 80%; background: #000; color: #0f0; border: 1px solid #0f0; }
        button { padding: 10px 20px; font-size: 1.2em; cursor: pointer; margin-top: 10px; background: #0f0; color: #000; border: none; }
        footer { margin-top: 50px; color: #555; font-size: 0.8em; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <h2>システム認証</h2>
        <input type="password" id="pass-input" placeholder="パスワードを入力">
        <br>
        <button onclick="startChallenge()">認証開始</button>
    </div>

    <div id="challenge-screen" class="screen hidden">
        <h2>ロボットじゃないことを認証してください</h2>
        <div id="statement"></div>
        <div id="equation"></div>
        <div id="timer">30.0</div>
        <input type="number" id="answer" placeholder="答えを入力">
        <br>
        <button onclick="checkAnswer()">送信</button>
    </div>

    <div id="success-screen" class="screen hidden">
        <h1 style="color: #0f0;">認証成功</h1>
        <p>おめでとうございます！</p>
        <button onclick="location.reload()">もう一度プレイします</button>
    </div>

    <footer>
        <p>Password Hint: 1097</p>
    </footer>

    <script>
        let timerId;
        let timeLeft = 30.0;
        let correctAnswer;

function generateComplexProblem() {
    const sqVal = [4, 9, 16, 25, 36, 49, 64, 81];
    const A = sqVal[Math.floor(Math.random() * sqVal.length)];
    const B = Math.floor(Math.random() * 8) + 2;
    const C = Math.floor(Math.random() * 4) + 2; // 分母
    const D = [30, 90][Math.floor(Math.random() * 2)]; // 30度か90度
    const E = Math.floor(Math.random() * 5) + 1; // sinの係数

    // 表示用の式（視覚的に複雑にする）
    // 数式: ((√A * B) / C) + (sin(D°) * E * 2)
    const displayFormula = `( (√${A} × ${B}) ÷ ${C} ) + ( sin(${D}°) × ${E * 2} )`;
    
    const statement = "以下の数式を計算せよ（小数点以下は四捨五入）。";

    // 計算ロジック
    // Math.sinはラジアンなので、度数法に変換 (D * Math.PI / 180)
    const sinVal = Math.sin(D * Math.PI / 180);
    const fracPart = (Math.sqrt(A) * B) / C;
    const result = fracPart + (sinVal * (E * 2));
    
    return { statement, formula: displayFormula, a: Math.round(result) };
}
            const statement = prompts[Math.floor(Math.random() * prompts.length)];

            const result = (Math.sqrt(A) * B) / C + (1 * D);
            
            return { statement, formula: displayFormula, a: Math.round(result) };
        }

        function startChallenge() {
            if(document.getElementById('pass-input').value !== "1097") {
                alert("パスワードが違います！");
                return;
            }

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('challenge-screen').classList.remove('hidden');

            const prob = generateComplexProblem();
            document.getElementById('statement').innerText = prob.statement;
            document.getElementById('equation').innerText = prob.formula;
            correctAnswer = prob.a;

            timerId = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('timer').innerText = timeLeft.toFixed(1);
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    alert("時間切れ。認証失敗。");
                    location.reload();
                }
            }, 100);
        }

        function checkAnswer() {
            const userAnswer = parseInt(document.getElementById('answer').value);
            if (userAnswer === correctAnswer) {
                clearInterval(timerId);
                document.getElementById('challenge-screen').classList.add('hidden');
                document.getElementById('success-screen').classList.remove('hidden');
            } else {
                alert("不正解！強制再起動します。");
                location.reload();
            }
        }
    </script>
</body>
</html>
