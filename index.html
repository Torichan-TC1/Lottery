<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>スパルタ数学認証 v6.0</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; text-align: center; padding: 20px; background: #000; color: #0f0; }
        .screen { border: 2px solid #0f0; padding: 20px; width: 450px; margin: 50px auto; border-radius: 5px; background: #111; }
        .hidden { display: none; }
        #timer { font-size: 3em; color: #ff0000; margin: 10px 0; font-weight: bold; }
        input { padding: 8px; font-size: 1.2em; width: 80%; background: #000; color: #0f0; border: 1px solid #0f0; margin-bottom: 10px; }
        button { padding: 10px 20px; font-size: 1.2em; cursor: pointer; margin-top: 10px; background: #0f0; color: #000; border: none; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <h2>システム認証</h2>
        <input type="password" id="pass-input" placeholder="パスワードを入力">
        <br>
        <button onclick="startChallenge()">認証開始</button>
    </div>

    <div id="challenge-screen" class="screen hidden">
        <h2>ロボットではないことを証明せよ</h2>
        <p>以下の数式を30秒以内に解け：</p>
        <div id="equation" style="font-size: 1.3em; margin: 20px; color: #fff;"></div>
        <div id="timer">30.0</div>
        <input type="number" id="answer" placeholder="答えを入力">
        <br>
        <button onclick="checkAnswer()">送信</button>
    </div>

    <div id="success-screen" class="screen hidden">
        <h1 style="color: #0f0;">認証成功</h1>
        <p>システムへのアクセスを許可します。</p>
        <button onclick="location.reload()">再ログイン</button>
    </div>

    <script>
        let timerId;
        let timeLeft = 30.0;
        let correctAnswer;

        // 数式をランダム生成する関数
        function generateProblem() {
            const a = Math.floor(Math.random() * 20) + 1;
            const b = Math.floor(Math.random() * 10) + 1;
            const c = Math.floor(Math.random() * 5) + 1;
            const d = Math.floor(Math.random() * 20) + 1;
            
            // いくつかのパターンをランダムに選択
            const type = Math.floor(Math.random() * 3);
            let q, a_val;
            
            if (type === 0) {
                // パターン: (a * b) / c + d
                q = `(${a} × ${b}) ÷ ${c} + ${d}`;
                a_val = Math.floor((a * b) / c) + d;
            } else if (type === 1) {
                // パターン: a * (b + c) - d
                q = `${a} × (${b} + ${c}) - ${d}`;
                a_val = a * (b + c) - d;
            } else {
                // パターン: (a + b) * (c + d) / 2
                q = `(${a} + ${b}) × (${c} + ${d}) ÷ 2`;
                a_val = ((a + b) * (c + d)) / 2;
            }
            return { q, a: a_val };
        }

        function startChallenge() {
            // パスワード判定
            if(document.getElementById('pass-input').value !== "1097") {
                alert("パスワードが違います！");
                return;
            }

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('challenge-screen').classList.remove('hidden');

            // 問題生成
            const problem = generateProblem();
            document.getElementById('equation').innerText = problem.q;
            correctAnswer = problem.a;

            // タイマー開始
            timerId = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('timer').innerText = timeLeft.toFixed(1);
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    alert("時間切れ！認証されませんでした。");
                    location.reload();
                }
            }, 100);
        }

        function checkAnswer() {
            const userAnswer = parseInt(document.getElementById('answer').value);
            if (userAnswer === correctAnswer) {
                clearInterval(timerId);
                document.getElementById('challenge-screen').classList.add('hidden');
                document.getElementById('success-screen').classList.remove('hidden');
            } else {
                alert("不正解です！");
                location.reload();
            }
        }
    </script>
</body>
</html>
