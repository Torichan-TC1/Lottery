<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>理不尽AI上司LINE（完全版）</title>
    <style>
        body { margin: 0; background-color: #8ea3c4; font-family: sans-serif; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #chat-window { width: 100%; max-width: 400px; background: #8ea3c4; display: flex; flex-direction: column; height: 100vh; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message { display: flex; margin-bottom: 15px; }
        .message.me { justify-content: flex-end; }
        .bubble { padding: 10px 15px; border-radius: 18px; max-width: 70%; word-wrap: break-word; position: relative; }
        .boss { background: white; color: black; border-top-left-radius: 2px; }
        .me { background: #95ec69; color: black; border-top-right-radius: 2px; }
        #footer { background: white; padding: 10px; display: flex; }
        input { flex: 1; border: none; padding: 10px; outline: none; }
        button { background: #95ec69; border: none; border-radius: 5px; padding: 0 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-window">
        <div id="messages"></div>
        <div id="footer">
            <input type="text" id="input" placeholder="メッセージを入力...">
            <button onclick="send()">送信</button>
        </div>
    </div>

    <script>
        // --- 強化された返信エンジン ---
        const responses = {
            report: {
                normal: ["了解。で、次のタスクは？", "まあ、及第点だね。次はもっと早く。", "ふーん。で、ここ直せる？", "把握した。あと資料5枚追加で。"],
                busy: ["報告は後でいいよ。今忙しい。", "あ、今立て込んでるから後で。", "…結論だけ言える？", "メールで送っておいて。"],
                angry: ["やっと終わったの？遅すぎるよ。", "こんなものか。期待してたんだけど。", "質が低いね。やり直し。", "それ、本当に僕が指示したやつ？"]
            },
            excuse: {
                normal: ["理由はいいから、どうするか言って。", "それが君の限界？", "言い訳を探す暇があるなら手を動かして。", "で、いつまでに挽回するの？"],
                busy: ["忙しいんだよね今。またにして。", "それは僕の仕事じゃないよ。", "言い訳は聞いてないよ。", "後回しでいいや。"],
                angry: ["だから何？", "言い訳を聞くために雇ったんじゃない。", "…もう帰っていいよ。", "時間の無駄だ。"]
            },
            question: {
                normal: ["自分で考えてみて。", "ググれば一発じゃない？", "それ、聞く前に調べた？", "もう少し工夫しようか。"],
                busy: ["今、会議中なんだけど。", "後にしてくれる？", "…メールで詳細送っといて。", "今は手が離せない。"],
                angry: ["そんなことも分からないの？", "やる気ある？", "少しは自分で工夫しなよ。", "基本だろう？それ。"]
            }
        };

        let currentMood = "normal";

        function getReply(text) {
            // 気分をランダム変更（30%の確率で変動）
            const moods = ["normal", "busy", "angry"];
            if (Math.random() < 0.3) currentMood = moods[Math.floor(Math.random() * moods.length)];
            
            // 意図判定（キーワード検索）
            let intent = "report";
            if (text.includes("すみません") || text.includes("無理") || text.includes("ごめんなさい")) intent = "excuse";
            else if (text.includes("どう") || text.includes("教えて") || text.includes("？") || text.includes("教えてください")) intent = "question";

            // 返信パターンからランダム抽出
            const pool = responses[intent][currentMood];
            return pool[Math.floor(Math.random() * pool.length)];
        }

        // --- UI操作 ---
        function addMessage(text, isMe) {
            const div = document.createElement('div');
            div.className = isMe ? 'message me' : 'message';
            div.innerHTML = `<div class="bubble ${isMe ? 'me' : 'boss'}">${text}</div>`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        function send() {
            const input = document.getElementById('input');
            if (!input.value.trim()) return; // 空文字チェック
            addMessage(input.value, true);
            const userText = input.value;
            input.value = '';

            // AIの思考遅延（1秒〜2秒でランダムに変化させる）
            const delay = 1000 + Math.random() * 1000;
            setTimeout(() => {
                const reply = getReply(userText);
                addMessage(reply, false);
            }, delay);
        }

        // --- Enterキー対応 ---
        document.getElementById('input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') send();
        });
    </script>
</body>
</html>
