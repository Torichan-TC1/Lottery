<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>スパルタ数学認証 v8.0</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; text-align: center; padding: 20px; background: #000; color: #0f0; }
        .screen { border: 2px solid #0f0; padding: 20px; width: 600px; margin: 30px auto; border-radius: 5px; background: #111; }
        .hidden { display: none; }
        #timer { font-size: 3em; color: #ff0000; margin: 10px 0; font-weight: bold; }
        #equation { font-size: 1.5em; margin: 20px; color: #fff; background: #000; padding: 15px; border: 1px solid #333; }
        input { padding: 8px; font-size: 1.2em; width: 80%; background: #000; color: #0f0; border: 1px solid #0f0; }
        button { padding: 10px 20px; font-size: 1.2em; cursor: pointer; margin-top: 10px; background: #0f0; color: #000; border: none; }
        footer { margin-top: 50px; color: #555; font-size: 0.8em; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <h2>システム認証</h2>
        <input type="password" id="pass-input" placeholder="パスワードを入力">
        <br>
        <button onclick="startChallenge()">認証開始</button>
    </div>

    <div id="challenge-screen" class="screen hidden">
        <h2>高難度：数学的整合性テスト</h2>
        <p>以下の数式を解け（小数点以下は四捨五入せよ）</p>
        <div id="equation"></div>
        <div id="timer">30.0</div>
        <input type="number" id="answer" placeholder="答えを入力">
        <br>
        <button onclick="checkAnswer()">回答送信</button>
    </div>

    <div id="success-screen" class="screen hidden">
        <h1 style="color: #0f0;">認証成功</h1>
        <p>アクセス許可。ようこそ。</p>
        <button onclick="location.reload()">再試行</button>
    </div>

    <footer>
        <p>Password Hint: 1097</p>
    </footer>

    <script>
        let timerId;
        let timeLeft = 30.0;
        let correctAnswer;

        function generateComplexProblem() {
            // 変数を生成
            const sqVal = [4, 9, 16, 25, 36, 49, 64, 81, 100];
            const A = sqVal[Math.floor(Math.random() * sqVal.length)]; // ルートの中身
            const B = Math.floor(Math.random() * 10) + 1;
            const C = Math.floor(Math.random() * 5) + 1;
            const D = Math.floor(Math.random() * 20) + 1;

            // 数式文字列: (√A * B) / C + sin(90°) * D
            const q = `(√${A} × ${B}) ÷ ${C} + sin(90°) × ${D}`;
            
            // 計算: √A は Math.sqrt(A)
            const result = (Math.sqrt(A) * B) / C + (1 * D);
            
            return { q: q, a: Math.round(result) };
        }

        function startChallenge() {
            if(document.getElementById('pass-input').value !== "1097") {
                alert("パスワードが違います！");
                return;
            }

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('challenge-screen').classList.remove('hidden');

            const prob = generateComplexProblem();
            document.getElementById('equation').innerText = prob.q;
            correctAnswer = prob.a;

            timerId = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('timer').innerText = timeLeft.toFixed(1);
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    alert("時間切れ。認証失敗。");
                    location.reload();
                }
            }, 100);
        }

        function checkAnswer() {
            const userAnswer = parseInt(document.getElementById('answer').value);
            if (userAnswer === correctAnswer) {
                clearInterval(timerId);
                document.getElementById('challenge-screen').classList.add('hidden');
                document.getElementById('success-screen').classList.remove('hidden');
            } else {
                alert("不正解！強制再起動します。");
                location.reload();
            }
        }
    </script>
</body>
</html>
