<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>スパルタ認証システム</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        #quiz-box { border: 2px solid #333; padding: 20px; width: 300px; margin: auto; }
        #timer { font-size: 2em; color: red; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>GitHub ログイン</h2>
        <input type="password" placeholder="パスワードを入力">
        <button onclick="startChallenge()">ログイン</button>
    </div>

    <div id="challenge-screen" class="hidden">
        <h2>認証：ロボットではないことを証明せよ</h2>
        <p>以下の計算を30秒以内に解け：</p>
        <div id="equation" style="font-size: 1.5em; margin: 10px;"></div>
        <div id="timer">30</div>
        <input type="number" id="answer" placeholder="答えを入力">
        <button onclick="checkAnswer()">送信</button>
    </div>

    <script>
        let countdown;
        let correctAnswer;
        let timeLeft = 30;

        function startChallenge() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('challenge-screen').classList.remove('hidden');
            
            // 超難しい（？）計算式を生成
            const a = Math.floor(Math.random() * 90) + 10;
            const b = Math.floor(Math.random() * 90) + 10;
            const c = Math.floor(Math.random() * 10) + 1;
            correctAnswer = (a * b) + c;
            document.getElementById('equation').innerText = `${a} × ${b} + ${c} = ?`;

            // タイマー開始
            countdown = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    alert("時間切れ！認証されませんでした。");
                    location.reload(); // ページをリロードして最初から
                }
            }, 1000);
        }

        function checkAnswer() {
            const userAnswer = document.getElementById('answer').value;
            clearInterval(countdown);
            if (parseInt(userAnswer) === correctAnswer) {
                alert("おめでとう！認証成功です。");
            } else {
                alert("不正解です。ログインに戻ります。");
                location.reload();
            }
        }
    </script>
</body>
</html>
