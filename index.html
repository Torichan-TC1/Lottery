<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>スパルタ数学認証 v3.0</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; text-align: center; padding: 20px; background: #000; color: #0f0; }
        .screen { border: 2px solid #0f0; padding: 20px; width: 400px; margin: 30px auto; border-radius: 5px; background: #111; }
        .hidden { display: none; }
        .visitor-counter { font-size: 0.9em; color: #555; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        #timer { font-size: 3em; color: #ff0000; margin: 10px 0; font-weight: bold; }
        input { padding: 8px; font-size: 1.2em; width: 80%; background: #000; color: #0f0; border: 1px solid #0f0; }
        button { padding: 10px 20px; font-size: 1.2em; cursor: pointer; margin-top: 10px; background: #0f0; color: #000; border: none; }
        footer { margin-top: 50px; color: #555; font-size: 0.8em; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="visitor-counter">Current Visitors: <span id="count">0</span></div>
        <h2>SYSTEM ACCESS</h2>
        <input type="password" id="pass-input" placeholder="Password">
        <br>
        <button onclick="startChallenge()">ENTER</button>
    </div>

    <div id="challenge-screen" class="screen hidden">
        <h2>VERIFICATION REQUIRED</h2>
        <p>Solve this within 30 seconds:</p>
        <div id="equation" style="font-size: 1.5em; margin: 20px; color: #fff;"></div>
        <div id="timer">30.0</div>
        <input type="number" id="answer" placeholder="Answer">
        <button onclick="checkAnswer()">SUBMIT</button>
    </div>

    <div id="success-screen" class="screen hidden">
        <h1 style="color: #0f0;">SUCCESS</h1>
        <p>Welcome to the system.</p>
        <button onclick="location.reload()">Reset</button>
    </div>

    <footer>
        <p>Hint: Password is "secret123"</p>
    </footer>

    <script>
        // 来場者数のシミュレーション
        document.getElementById('count').innerText = Math.floor(Math.random() * 5000) + 120;

        let timerId;
        let timeLeft = 30.0;
        let correctAnswer;

        // 分数や積分を含む難問リスト
        const problems = [
            { q: "(1/2) * 50 + 10", a: 35 },
            { q: "∫(0 to 2) 2x dx", a: 4 },
            { q: "(1/4) * 100 - √9", a: 22 },
            { q: "√169 + (1/3) * 30", a: 23 }
        ];

        function startChallenge() {
            if(document.getElementById('pass-input').value !== "secret123") {
                alert("Wrong Password!");
                return;
            }

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('challenge-screen').classList.remove('hidden');

            const prob = problems[Math.floor(Math.random() * problems.length)];
            document.getElementById('equation').innerText = prob.q;
            correctAnswer = prob.a;

            timerId = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('timer').innerText = timeLeft.toFixed(1);
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    alert("Time Limit Exceeded.");
                    location.reload();
                }
            }, 100);
        }

        function checkAnswer() {
            const userAnswer = document.getElementById('answer').value;
            if (parseInt(userAnswer) === correctAnswer) {
                clearInterval(timerId);
                document.getElementById('challenge-screen').classList.add('hidden');
                document.getElementById('success-screen').classList.remove('hidden');
            } else {
                alert("Incorrect Answer.");
                location.reload();
            }
        }
    </script>
</body>
</html>
